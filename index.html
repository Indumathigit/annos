<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KYC Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #eef1f5; color: #333; height: 100vh; overflow: hidden; }
        .navbar { background: #000; color: #fff; padding: 15px 25px; display: flex; gap: 8px; flex-wrap: wrap; }
        .navbar span { cursor: pointer; font-weight: 600; opacity: 0.8; font-size: 11px; text-transform: uppercase; padding: 5px 10px; border-radius: 4px; }
        .navbar span:hover { background: #333; opacity: 1; }
        .navbar span.active-tab { color: #fff; background: #007bff; opacity: 1; }

        .container { display: flex; gap: 20px; padding: 20px; height: calc(100vh - 80px); box-sizing: border-box; }
        .left-panel { flex: 1.1; display: flex; flex-direction: column; gap: 10px; }
        .form-box { background: #fff; padding: 20px; border-radius: 10px; flex-grow: 1; overflow-y: auto; border: 1px solid #ddd; position: relative; }
        .right-panel { flex: 0.9; display: flex; flex-direction: column; gap: 10px; }
        
        textarea { flex-grow: 1; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-family: 'Courier New', monospace; resize: none; background: #fff; font-size: 13px; color: #1a1a1a; line-height: 1.6; }
        
        .field { margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.75em; color: #555; text-transform: uppercase; }
        
        .multi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .choice-row { display: flex; gap: 4px; flex-wrap: wrap; }
        button { background: #eee; border: 1px solid #ddd; padding: 6px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 0.75em; text-transform: uppercase; }
        button.active { background: #007bff; color: #fff; border-color: #0056b3; }

        .action-section { background: #f0f7ff; padding: 15px; border-radius: 8px; border: 1px solid #007bff; margin-top: 10px; }
        .primary-btn { background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .copy-btn { background: #6c2bd9; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        input, select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; font-size: 13px; margin-top: 4px;}
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; margin-bottom: 15px; padding-bottom: 5px; }
        h3 { margin: 0; color: #007bff; font-size: 1.1em; }
        .reset-link { color: #dc3545; font-size: 0.7em; cursor: pointer; text-decoration: underline; font-weight: bold; }
        .clear-btn { background: #dc3545; color: #fff; padding: 2px 6px; font-size: 0.7em; margin-left: 10px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-logo">KYC LR</div>
    <span class="nav-btn" onclick="load('loa', this)">LOA</span>
    <span class="nav-btn" onclick="load('idv', this)">IDV</span>
    <span class="nav-btn" onclick="load('biv', this)">BIV</span>
    <span class="nav-btn" onclick="load('bov', this)">BOV</span>
    <span class="nav-btn" onclick="load('bav ramp', this)">BAV RAMP</span>
    <span class="nav-btn" onclick="load('lrv', this)">LRV</span>
</div>

<div class="workspace">
    <!-- LEFT PANEL -->
    <div class="left-panel">
        <div id="form" class="form-box">
            <div style="text-align: center; padding-top: 50px; color: #999;">Select a module from the top to begin</div>
        </div>
        <button class="primary-btn" id="genBtn" style="display:none;" onclick="generate()">Generate Note</button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <textarea id="output" readonly placeholder="Your generated note will appear here..."></textarea>
        <button id="copyBtn" class="copy-btn" onclick="copy()">Copy to Clipboard</button>
    </div>
</div>

<script>
let state = {};
let current = "";

function setVal(k, v, el) {
    state[k] = v;
    if(el) {
        let btns = el.parentElement.querySelectorAll('button');
        btns.forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
    // Auto-derive Strategic/Trusted from FDD answer
    if (k === 'fdd') {
        const tierVal = v === 'Y' ? 'Strategic' : 'Non strategic';
        state['tier'] = tierVal;
        const tierDisplay = document.getElementById('tierDisplay');
        if (tierDisplay) {
            tierDisplay.textContent = tierVal;
            tierDisplay.style.color = v === 'Y' ? 'var(--accent)' : 'var(--text-dim)';
        }
    }
}

function toggleMulti(key, val, el) {
    if (!state[key]) state[key] = [];
    const index = state[key].indexOf(val);
    if (index > -1) {
        state[key].splice(index, 1);
        el.classList.remove('active');
    } else {
        state[key].push(val);
        el.classList.add('active');
    }
}

function clearMulti(key) {
    state[key] = [];
    document.querySelectorAll('.multi-grid button').forEach(b => b.classList.remove('active'));
}

function load(type, el) {
    current = type; state = {};
    document.querySelectorAll('.navbar span').forEach(s => s.classList.remove('active-tab'));
    if(el) el.classList.add('active-tab');
    document.getElementById('genBtn').style.display = 'block';
    document.getElementById('output').value = "";

    const deltaOptions = [...Array.from({length:21},(_,i)=>`Delta ${i+1}`), 'no change', 'PKYC', 'FSIV', 'FKYC', 'New Registration'];
    const infoOptions = ['as per delta codes', 'no changes', 'RL changed', 'PKYC', 'FKYC', 'FSIV', 'New Registration'];

    const getCommons = (inclFDD = true) => {
        let html = "";
        if(inclFDD) html += `<div class='field'><label>Does FDD apply?:</label><div class='choice-row'><button onclick="setVal('fdd','Y',this)">Y</button><button onclick="setVal('fdd','N',this)">N</button></div></div>`;
        html += `
        <div class='field'><label>disb. status check:</label><select onchange="state['disb']=this.value"><option value=''>Select</option><option>allow</option><option>disallow by system</option><option>disallow by sim</option></select></div>
        <div class='field'><label>Clover Flags (if applicable):</label><select onchange="state['clover']=this.value"><option value=''>Select</option><option>pass</option><option>No review needed</option><option>sign in from these countries</option></select></div>
        <div class='field'><label>Potential LEC:</label><div class='choice-row'><button onclick="setVal('lec','yes',this)">yes</button><button onclick="setVal('lec','no',this)">no</button></div></div>
        <div class='field'><label>Potential wrong entity:</label><div class='choice-row'><button onclick="setVal('wrong','yes',this)">yes</button><button onclick="setVal('wrong','no',this)">no</button></div></div>
        <div class='field'><label>COC WF - Delta code <button class="clear-btn" onclick="clearMulti('delta')">Clear</button></label><div class='multi-grid'>${deltaOptions.map(o => `<button onclick="toggleMulti('delta','${o}',this)">${o}</button>`).join('')}</div></div>
        <div class='field'><label>COC WF - what info changed:</label><div class='multi-grid'>${infoOptions.map(o => `<button onclick="toggleMulti('info','${o}',this)">${o}</button>`).join('')}</div></div>
        <div class='field'><label>COC WF - bank account belongs to registered person or business ?</label><select onchange="state['bank']=this.value"><option value=''>Select</option><option>Person</option><option>Business</option><option>PKYC</option><option>FKYC</option><option>FSIV</option><option>New Registration</option></select></div>`;
        return html;
    };

    let f = `<div class="header-row"><h3>KYC - ${type.toUpperCase()}</h3><span class="reset-link" onclick="load('${type}')">RESET FORM</span></div>`;

    if(type === 'loa') {
        f += getCommons(false) + `
        <div class='field'><label>Legal representative verification (if no LRV task):</label><input oninput="state['lrv_check']=this.value"></div>
        <div class='field'><label>LOA URN:</label><input oninput="state['loa_urn']=this.value"></div>
        <div class='field'><label>LOA signatory registration status (APA accounts only):</label><input oninput="state['apa_status']=this.value"></div>`;
    } else if(type === 'idv') {
        f += getCommons(true) + `
        <div class='field'><label>POC legal representative check(if no LRV task):</label><input oninput="state['poc']=this.value"></div>
        <div class='field'><label>ID URN:</label><input oninput="state['id_urn']=this.value"></div>
        <div class='field'><label>POA URN:</label><input oninput="state['poa_urn']=this.value"></div>
        <div class='field'><label>Strategic or Trusted?:</label><div class='choice-row'><button onclick="setVal('tier','Strategic',this)">Strategic</button><button onclick="setVal('tier','Non strategic',this)">Non strategic</button></div></div>
        <div class='field'><label>suspicious doc check (if found any):</label><input oninput="state['susp_check']=this.value"></div>`;
    } else if(type === 'biv') {
        f += getCommons(true) + `
        <div class='field'><label>POC legal representative check(if no LRV task):</label><input oninput="state['poc']=this.value"></div>
        <div class='field'><label>RE URN:</label><input oninput="state['re_urn']=this.value"></div>
        <div class='field'><label>External Research URN (if needed):</label><input placeholder="NA" oninput="state['ext_urn']=this.value"></div>
        <div class='field'><label>Current business status:</label><input placeholder="Active" oninput="state['biz_status']=this.value"></div>
        <div class='field'><label>Is COI same as Country of Biz address?:</label><div class='choice-row'><button onclick="setVal('coi_match','Yes',this)">Yes</button><button onclick="setVal('coi_match','No',this)">No</button></div></div>
        <div class='field'><label>Strategic or Trusted?:</label><div class='choice-row'><button onclick="setVal('tier','Strategic',this)">Strategic</button><button onclick="setVal('tier','Non strategic',this)">Non strategic</button></div></div>`;
    } else if(type === 'bov') {
        f += getCommons(true) + `
        <div class='field'><label>SA doc confirming ownership:</label><input oninput="state['sa_doc']=this.value"></div>
        <div class='field'><label>All in scope BOs registered correctly:</label><div class='choice-row'><button onclick="setVal('bo_reg','Yes',this)">Yes</button><button onclick="setVal('bo_reg','No',this)">No</button></div></div>
        <div class='field'><label>Is the provided SA recent?:</label><div class='choice-row'><button onclick="setVal('sa_recent','Yes',this)">Yes</button><button onclick="setVal('sa_recent','No',this)">No</button></div></div>
        <div class='field'><label>Does SA information match with central registry/ext research?:</label><input oninput="state['sa_match']=this.value"></div>
        <div class='field'><label>PC screening (if applicable):</label><input oninput="state['pc_screen']=this.value"></div>
        <div class='field'><label>Name: match/no match/urn:</label><input oninput="state['name_match']=this.value"></div>
        <div class='field'><label>Strategic or Trusted?:</label><div class='choice-row'><button onclick="setVal('tier','Strategic',this)">Strategic</button><button onclick="setVal('tier','Non strategic',this)">Non strategic</button></div></div>`;
    } else if(type === 'bav ramp') {
        f += `
        <div class='field'><label>Account Overview:</label><select onchange="state['overview']=this.value"><option value=''>Select</option><option>Normal</option><option>Blocked</option></select></div>
        <div class='field'><label>Potential LEC:</label><div class='choice-row'><button onclick="setVal('lec','yes',this)">yes</button><button onclick="setVal('lec','no',this)">no</button></div></div>
        <div class='field'><label>Potential wrong entity:</label><div class='choice-row'><button onclick="setVal('wrong','yes',this)">yes</button><button onclick="setVal('wrong','no',this)">no</button></div></div>
        <div class='field'><label>BS:</label><input oninput="state['bs']=this.value"></div>
        <div class='field'><label>Is BS in name of BO (only for UK Seller):</label><div class='choice-row'><button onclick="setVal('uk_bo','Yes',this)">Yes</button><button onclick="setVal('uk_bo','No',this)">No</button></div></div>
        <div class='field'><label>PSC/Companies SS/SA Urn:</label><input oninput="state['psc_urn']=this.value"></div>
        <div class='field'><label>MO:</label><input oninput="state['mo']=this.value"></div>
        <div class='field'><label>Is it a EU based seller with 3rd party payment provider?:</label><div class='choice-row'><button onclick="setVal('eu_provider','Y',this)">Y</button><button onclick="setVal('eu_provider','N',this)">N</button></div></div>
        <div class='field'><label>If yes, are there any other red flags on the account?:</label><input oninput="state['red_flags']=this.value"></div>`;
    } else if(type === 'lrv') {
        f += getCommons(false) + `
        <div class='field'><label>Legal representative verification status:</label><input oninput="state['lrv_status']=this.value"></div>
        <div class='field'><label>LRV URN:</label><input oninput="state['lrv_urn']=this.value"></div>`;
    }

    f += `<div class="action-section"><label><strong>Final Action:</strong></label><div class='choice-row' style="margin-bottom:8px;"><button onclick="setVal('action','Verify',this)">Verify</button><button onclick="setVal('action','RFD',this)">RFD</button><button onclick="setVal('action','Fail',this)">Fail</button><button onclick="setVal('action','Transfer',this)">Transfer</button><button onclick="setVal('action','Escalate',this)">Escalate</button></div><input id="action_input" placeholder="Enter details..." oninput="state['action_details']=this.value"></div>`;
    document.getElementById('form').innerHTML = f;
    document.getElementById('formScroll').scrollTop = 0;
}

// Required fields per module — ALL fields must be filled.
const REQUIRED = {
    'loa':      ['disb','clover','lec','wrong','delta','info','bank','lrv_check','loa_urn','apa_status','action'],
    'idv':      ['fdd','disb','clover','lec','wrong','delta','info','bank','poc','id_urn','poa_urn','tier','susp_check','action'],
    'biv':      ['fdd','disb','clover','lec','wrong','delta','info','bank','poc','re_urn','ext_urn','biz_status','coi_match','tier','action'],
    'bov':      ['fdd','disb','clover','lec','wrong','delta','info','bank','sa_doc','bo_reg','sa_recent','sa_match','pc_screen','name_match','tier','action'],
    'bav ramp': ['overview','lec','wrong','bs','uk_bo','psc_urn','mo','eu_provider','red_flags','action'],
    'lrv':      ['lrv_overview','disb','signin','sig_name','sig_urn','sig_role','sig_doctype','sig_doc_urn','lec','wrong','delta','info','bank','action']
};

// Human-readable labels for error messages
const FIELD_LABELS = {
    fdd:'Does FDD Apply', disb:'Disb. Status Check', clover:'Clover Flags',
    lec:'Potential LEC', wrong:'Potential Wrong Entity',
    delta:'COC WF – Delta Code', info:'COC WF – What Info Changed', bank:'COC WF – Bank Account Belongs To',
    lrv_check:'Legal Representative Verification', loa_urn:'LOA URN', apa_status:'LOA Signatory Registration Status',
    poc:'POC Legal Representative Check', id_urn:'ID URN', poa_urn:'POA URN',
    tier:'Strategic or Trusted', susp_check:'Suspicious Doc Check',
    re_urn:'RE URN', ext_urn:'External Research URN', biz_status:'Current Business Status', coi_match:'Is COI Same as Country of Biz Address',
    sa_doc:'SA Doc Confirming Ownership', bo_reg:'All In-Scope BOs Registered Correctly',
    sa_recent:'Is the Provided SA Recent', sa_match:'Does SA Info Match Central Registry',
    pc_screen:'PC Screening', name_match:'Name Match / URN',
    overview:'Account Overview', bs:'BS', uk_bo:'Is BS in Name of BO',
    psc_urn:'PSC / Companies SS / SA URN', mo:'MO', eu_provider:'EU Based Seller with 3rd Party Provider', red_flags:'Any Other Red Flags',
    lrv_overview:'Account Overview', signin:'Sign-in',
    sig_name:'Signatory Name', sig_urn:'External Research URN', sig_role:'Signatory Role',
    sig_doctype:'Document Type', sig_doc_urn:'Document URN Link',
    action:'Final Action / Outcome'
};

function isFilled(key) {
    const v = state[key];
    if (Array.isArray(v)) return v.length > 0;
    return v !== undefined && v !== null && String(v).trim() !== '';
}

function validate() {
    const required = REQUIRED[current] || [];
    const missing = required.filter(k => !isFilled(k));

    // Clear previous error highlights
    document.querySelectorAll('.field.error').forEach(el => el.classList.remove('error'));

    if (missing.length === 0) return true;

    // Show inline error banner
    const existing = document.getElementById('validationBanner');
    if (existing) existing.remove();

    const names = missing.map(k => FIELD_LABELS[k] || k);
    const banner = document.createElement('div');
    banner.id = 'validationBanner';
    banner.style.cssText = `
        background: rgba(255,79,106,0.1);
        border: 1px solid rgba(255,79,106,0.35);
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 12px;
        color: var(--red);
        line-height: 1.7;
    `;
    banner.innerHTML = `<strong style="display:block;margin-bottom:4px;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;">⚠ ${missing.length} field${missing.length > 1 ? 's' : ''} required</strong>${names.map(n => `• ${n}`).join('<br>')}`;

    const formEl = document.getElementById('form');
    formEl.insertBefore(banner, formEl.firstChild.nextSibling); // after header
    document.getElementById('formScroll').scrollTop = 0;

    return false;
}

function generate() {
    // Remove old banner if exists
    const oldBanner = document.getElementById('validationBanner');
    if (oldBanner) oldBanner.remove();

    if (!validate()) return;

    let deltaStr = (state.delta || []).join(', ');
    let infoStr = (state.info || []).join(', ');
    let actionFinal = (state.action || '') + (state.action_details ? ' - ' + state.action_details : '');
    let o = '';

    if(current === 'loa') {
        o = `<strong>KYC LR- LOA </strong><br>\ndisb. status check: ${state.disb || ''}<br>\nClover Flags (if applicable): ${state.clover || ''}<br>\nPotential LEC: ${state.lec || ''}<br>\nPotential wrong entity: ${state.wrong || ''}<br>\nCOC WF - Delta code: ${deltaStr}<br>\nCOC WF - what info changed: ${infoStr}<br>\nCOC WF - bank account belongs to registered person or business ? ${state.bank || ''}<br>\nLegal representative verification (if no LRV task): ${state.lrv_check || ''}<br>\nLOA URN: ${state.loa_urn || ''}<br>\nLOA signatory registration status (APA accounts only): ${state.apa_status || ''}<br>\n<strong>Action: ${actionFinal}</strong>`;
    } else if(current === 'idv') {
        o = `<strong>KYC LR- IDV</strong><br>\nDoes FDD apply?: ${state.fdd || ''}<br>\ndisb. status check: ${state.disb || ''}<br>\nClover Flags (if applicable): ${state.clover || ''}<br>\nPotential LEC: ${state.lec || ''}<br>\nPotential wrong entity: ${state.wrong || ''}<br>\nCOC WF - Delta code: ${deltaStr}<br>\nCOC WF - what info changed: ${infoStr}<br>\nCOC WF - bank account belongs to registered person or business ? ${state.bank || ''}<br>\nPOC legal representative check(if no LRV task): ${state.poc || ''}<br>\nID URN: ${state.id_urn || ''}<br>\nPOA URN: ${state.poa_urn || ''}<br>\n<strong>Strategic or Trusted?: ${state.tier || ''}</strong><br>\nsuspicious doc check (if found any): ${state.susp_check || ''}<br>\n<strong>Action: ${actionFinal}</strong>`;
    } else if(current === 'biv') {
        o = `<strong>KYC LR- BIV</strong><br>\nDoes FDD apply?: ${state.fdd || ''}<br>\ndisb. status check: ${state.disb || ''}<br>\nClover Flags (if applicable): ${state.clover || ''}<br>\nPotential LEC: ${state.lec || ''}<br>\nPotential wrong entity: ${state.wrong || ''}<br>\nCOC WF - Delta code: ${deltaStr}<br>\nCOC WF - what info changed: ${infoStr}<br>\nCOC WF - bank account belongs to registered person or business ? ${state.bank || ''}<br>\nPOC legal representative check(if no LRV task): ${state.poc || ''}<br>\nRE URN: ${state.re_urn || ''}<br>\nExternal Research URN (if needed): ${state.ext_urn || ''}<br>\nCurrent business status: ${state.biz_status || ''}<br>\nIs COI same as Country of Biz address?: ${state.coi_match || ''}<br>\n<strong>Strategic or Trusted?: ${state.tier || ''}</strong><br>\n<strong>Action: ${actionFinal}</strong>`;
    } else if(current === 'bov') {
        o = `<strong>KYC LR- BOV</strong><br>\nDoes FDD apply?: ${state.fdd || ''}<br>\ndisb. status check: ${state.disb || ''}<br>\nClover Flags (if applicable): ${state.clover || ''}<br>\nPotential LEC: ${state.lec || ''}<br>\nPotential wrong entity: ${state.wrong || ''}<br>\nCOC WF - Delta code: ${deltaStr}<br>\nCOC WF - what info changed: ${infoStr}<br>\nCOC WF - bank account belongs to registered person or business ? ${state.bank || ''}<br>\nSA doc confirming ownership: ${state.sa_doc || ''}<br>\nAll in scope BOs registered correctly: ${state.bo_reg || ''}<br>\nIs the provided SA recent?: ${state.sa_recent || ''}<br>\nDoes SA information match with central registry/ext research?: ${state.sa_match || ''}<br>\n<strong> PC screening (if applicable): ${state.pc_screen || ''}<br>\nName: match/no match/urn: ${state.name_match || ''}<br>\n<strong>Strategic or Trusted?: ${state.tier || ''}</strong><br>\n<strong>Action: ${actionFinal}</strong>`;
    } else if(current === 'bav ramp') {
        o = `<strong> KYC LR- BAV RAMP </strong><br>\nAccount Overview: ${state.overview || ''}<br>\nPotential LEC: ${state.lec || ''}<br>\nPotential wrong entity: ${state.wrong || ''}<br>\nBS: ${state.bs || ''}<br>\nIs BS in name of BO (only for UK Seller): ${state.uk_bo || ''}<br>\nPSC/Companies SS/SA Urn: ${state.psc_urn || ''}<br>\nMO: ${state.mo || ''}<br>\nIs it a EU based seller with 3rd party payment provider?: ${state.eu_provider || ''}<br>\nIf yes, are there any other red flags on the account?: ${state.red_flags || ''}<br>\n<strong> Action: ${actionFinal}</strong>`;
    } else if(current === 'lrv') {
        o = `<strong>KYC LR- LRV </strong><br>\ndisb. status check: ${state.disb || ''}<br>\nClover Flags (if applicable): ${state.clover || ''}<br>\nPotential LEC: ${state.lec || ''}<br>\nPotential wrong entity: ${state.wrong || ''}<br>\nCOC WF - Delta code: ${deltaStr}<br>\nCOC WF - what info changed: ${infoStr}<br>\nCOC WF - bank account belongs to registered person or business ? ${state.bank || ''}<br>\nLegal representative verification status: ${state.lrv_status || ''}<br>\nLRV URN: ${state.lrv_urn || ''}<br>\n<strong>Action: ${actionFinal}</strong>`;
    }
    
    document.getElementById('output').value = o;
}

async function copy() {
    const output = document.getElementById('output').value;
    // Replace all <br>\n or just <br> with a real newline \n
    // Then strip out all remaining HTML tags like <strong>
    const cleanText = output.replace(/<br\s*\/?>/gi, '\n')
                            .replace(/<\/?[^>]+(>|$)/g, "");
    
    try {
        await navigator.clipboard.writeText(cleanText);
        const btn = document.getElementById('copyBtn'); 
        btn.innerText = "✓ Copied Successfully!";
        btn.style.background = "#28a745";
        setTimeout(() => {
            btn.innerText = "Copy to Clipboard";
            btn.style.background = "#6c2bd9";
        }, 2000);
    } catch (e) {
        alert('Unable to copy automatically. Please select text and copy manually.');
    }
}


</script>
</body>
</html>
