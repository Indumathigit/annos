<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KYC Tool - Full Registration Update</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #eef1f5; color: #333; height: 100vh; overflow: hidden; }
        .navbar { background: #000; color: #fff; padding: 15px 25px; display: flex; gap: 10px; flex-wrap: wrap; }
        .navbar span { cursor: pointer; font-weight: 600; opacity: 0.8; font-size: 11px; text-transform: uppercase; padding: 5px 10px; }
        .navbar span:hover { color: #007bff; opacity: 1; }
        .navbar span.active-tab { color: #007bff; border-bottom: 2px solid #007bff; }

        .container { display: flex; gap: 20px; padding: 20px; height: calc(100vh - 80px); box-sizing: border-box; }
        .left-panel { flex: 1.2; display: flex; flex-direction: column; gap: 10px; }
        .form-box { background: #fff; padding: 20px; border-radius: 10px; flex-grow: 1; overflow-y: auto; border: 1px solid #ddd; }
        .right-panel { flex: 0.8; display: flex; flex-direction: column; gap: 10px; }
        
        textarea { flex-grow: 1; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-family: 'Courier New', monospace; resize: none; background: #fff; font-size: 13px; color: #1a1a1a; line-height: 1.6; }
        
        .field { margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.8em; color: #555; }
        
        .multi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .choice-row { display: flex; gap: 4px; }
        button { background: #eee; border: none; padding: 6px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 0.75em; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #ddd; }
        button.active { background: #007bff; color: #fff; }

        .action-section { background: #f0f7ff; padding: 15px; border-radius: 8px; border: 1px solid #007bff; margin-top: 10px; }
        .primary-btn { background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .copy-btn { background: #6c2bd9; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        input, select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; font-size: 13px; margin-top: 5px; }
        h3 { margin: 0 0 15px 0; color: #007bff; font-size: 1.1em; border-bottom: 2px solid #007bff; padding-bottom: 5px;}
        .clear-btn { background: #dc3545; color: #fff; padding: 2px 6px; font-size: 0.7em; margin-left: 10px; border-radius: 3px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="navbar">
    <span onclick="load('loa', this)">LOA</span>
    <span onclick="load('idv', this)">IDV</span>
    <span onclick="load('biv', this)">BIV</span>
    <span onclick="load('bov', this)">BOV</span>
    <span onclick="load('bav ramp', this)">BAV RAMP</span>
    <span onclick="load('lrv', this)">LRV</span>
</div>

<div class="container">
    <div class="left-panel">
        <div id="form" class="form-box"></div>
        <button class="primary-btn" id="genBtn" style="display:none;" onclick="generate()">Generate Note</button>
    </div>
    <div class="right-panel">
        <textarea id="output" readonly></textarea>
        <button id="copyBtn" class="copy-btn" onclick="copy()">Copy to Clipboard</button>
    </div>
</div>

<script>
let state = {};
let current = "";

const reasons = {
    'idv': ['RFD for indate ID doc', 'RFD for indate POA', 'RFD for both ID and POA'],
    'biv': ['RFD for indate RE', 'RFD for valid RE'],
    'bov': ['RFD for recent SA', 'RFD for Org Chart'],
    'loa': ['RFD for LOA'],
    'bav ramp': ['RFD for indate BS', 'RFD for valid BS'],
    'lrv': ['RFD for LOA']
};

function toggleMulti(key, val, el) {
    if (!state[key]) state[key] = [];
    const index = state[key].indexOf(val);
    if (index > -1) {
        state[key].splice(index, 1);
        el.classList.remove('active');
    } else {
        state[key].push(val);
        el.classList.add('active');
    }
}

function clearMulti(key) {
    state[key] = [];
    document.querySelectorAll('.multi-grid button').forEach(b => b.classList.remove('active'));
}

function setVal(k, v, el) {
    state[k] = v;
    if(el) {
        let btns = el.parentElement.querySelectorAll('button');
        btns.forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
    const drop = document.getElementById('reason_dropdown');
    if (drop && (v === 'RFD' || v === 'Fail')) {
        drop.style.display = 'block';
    } else if (drop) {
        drop.style.display = 'none';
        state['action_details'] = '';
    }
    
    if (current === 'bav ramp' && k === 'eu') {
        const flagBox = document.getElementById('red_flag_container');
        if (flagBox) flagBox.style.display = (v === 'Y') ? 'block' : 'none';
    }
}

function load(type, el) {
    current = type; state = {};
    document.querySelectorAll('.navbar span').forEach(s => s.classList.remove('active-tab'));
    el.classList.add('active-tab');
    document.getElementById('genBtn').style.display = 'block';

    // Added New Registration to Delta and Info options
    const deltaOptions = [...Array.from({length:12},(_,i)=>`Delta ${i+1}`), 'no change', 'PKYC', 'FSIV', 'FKYC', 'New Registration'];
    const infoOptions = ['as per delta codes', 'no changes', 'RL changed', 'PKYC', 'FKYC', 'FSIV', 'New Registration'];

    let f = `<h3>KYC - ${type.toUpperCase()}</h3>`;
    const common = () => `
        <div class='field'><label>disb. status check:</label>
            <select onchange="state['disb']=this.value"><option value=''>Select Status</option><option>allow</option><option>disallow by system</option><option>disallow by sim</option></select>
        </div>
        <div class='field'><label>Clover Flags (if applicable):</label><select onchange="state['clover']=this.value"><option value='pass'>pass</option><option>No review needed</option><option>sign in from these countries</option></select></div>
        <div class='field'><label>Potential LEC:</label><div class='choice-row'><button onclick="setVal('lec','yes',this)">yes</button><button onclick="setVal('lec','no',this)">no</button></div></div>
        <div class='field'><label>Potential wrong entity:</label><div class='choice-row'><button onclick="setVal('wrong','yes',this)">yes</button><button onclick="setVal('wrong','no',this)">no</button></div></div>
        <div class='field'><label>COC WF - Delta code <button class="clear-btn" onclick="clearMulti('delta')">Clear</button></label>
            <div class='multi-grid'>${deltaOptions.map(opt => `<button onclick="toggleMulti('delta','${opt}',this)">${opt}</button>`).join('')}</div>
        </div>
        <div class='field'><label>COC WF - what info changed:</label>
            <div class='multi-grid'>${infoOptions.map(opt => `<button onclick="toggleMulti('info','${opt}',this)">${opt}</button>`).join('')}</div>
        </div>
        <div class='field'><label>bank account belongs to registered person or business ?</label><select onchange="state['bank']=this.value"><option value=''>Select</option><option>Person</option><option>Business</option><option>PKYC</option><option>FKYC</option><option>FSIV</option><option>New Registration</option></select></div>`;

    if(type === 'loa') {
        f += common() + `<div class='field'><label>Legal representative verification (if no LRV task):</label><input oninput="state['lrv']=this.value"><label>LOA URN:</label><input oninput="state['urn']=this.value"><label>LOA signatory registration status (APA only):</label><input oninput="state['sign']=this.value"></div>`;
    } else if(type === 'idv') {
        f = `<h3>KYC - IDV</h3><div class='field'><label>Does FDD apply?:</label><div class='choice-row'><button onclick="setVal('fdd','Y',this)">Y</button><button onclick="setVal('fdd','N',this)">N</button></div></div>` + common() + `<div class='field'><label>POC legal representative check:</label><input oninput="state['poc']=this.value"><label>ID URN:</label><input oninput="state['id_urn']=this.value"><label>POA URN:</label><input oninput="state['poa_urn']=this.value"><label>Strategic or Trusted?:</label><div class='choice-row'><button onclick="setVal('tier','Strategic',this)">Strategic</button><button onclick="setVal('tier','Non strategic',this)">Non strategic</button></div><label>suspicious doc check:</label><div class='choice-row'><button onclick="setVal('susp','Y',this)">Y</button><button onclick="setVal('susp','N',this)">N</button></div></div>`;
    } else if(type === 'biv') {
        f = `<h3>KYC - BIV</h3><div class='field'><label>Does FDD apply?:</label><div class='choice-row'><button onclick="setVal('fdd','Y',this)">Y</button><button onclick="setVal('fdd','N',this)">N</button></div></div>` + common() + `<div class='field'><label>POC legal representative check:</label><input oninput="state['poc']=this.value"><label>RE URN:</label><input oninput="state['re_urn']=this.value"><label>External Research URN:</label><input placeholder="NA" oninput="state['ext_urn']=this.value"><label>Strategic or Trusted?:</label><div class='choice-row'><button onclick="setVal('tier','Strategic',this)">Strategic</button><button onclick="setVal('tier','Non strategic',this)">Non strategic</button></div></div>`;
    } else if(type === 'bov') {
        f = `<h3>KYC - BOV</h3><div class='field'><label>Does FDD apply?:</label><div class='choice-row'><button onclick="setVal('fdd','Y',this)">Y</button><button onclick="setVal('fdd','N',this)">N</button></div></div>` + common() + `<div class='field'><label>SA doc confirming ownership:</label><input oninput="state['sa_doc']=this.value"><label>Does SA information match central registry?:</label><input oninput="state['sa_match']=this.value"><label>Strategic or Trusted?:</label><div class='choice-row'><button onclick="setVal('tier','Strategic',this)">Strategic</button><button onclick="setVal('tier','Non strategic',this)">Non strategic</button></div></div>`;
    } else if(type === 'bav ramp') {
        f = `<h3>KYC - BAV RAMP</h3>
            <div class='field'><label>Account Overview:</label><div class='choice-row'><button onclick="setVal('overview','Normal',this)">Normal</button><button onclick="setVal('overview','Blocked',this)">Blocked</button></div></div>
            <div class='field'><label>Potential LEC:</label><div class='choice-row'><button onclick="setVal('lec','yes',this)">yes</button><button onclick="setVal('lec','no',this)">no</button></div></div>
            <div class='field'><label>Potential wrong entity:</label><div class='choice-row'><button onclick="setVal('wrong','yes',this)">yes</button><button onclick="setVal('wrong','no',this)">no</button></div></div>
            <div class='field'><label>BS:</label><input oninput="state['bs']=this.value"></div>
            <div class='field'><label>Is BS in name of BO (only for UK Seller):</label><div class='choice-row'><button onclick="setVal('uk_bo','Yes',this)">Yes</button><button onclick="setVal('uk_bo','No',this)">No</button></div></div>
            <div class='field'><label>PSC/Companies SS/SA Urn:</label><div class='choice-row'><button onclick="setVal('psc','NA',this)">NA</button><button onclick="setVal('psc','Y',this)">Y</button></div></div>
            <div class='field'><label>MO:</label><div class='choice-row'><button onclick="setVal('mo','Y',this)">Y</button><button onclick="setVal('mo','N',this)">N</button></div></div>
            <div class='field'><label>Is it a EU based seller with 3rd party payment provider?</label><div class='choice-row'><button onclick="setVal('eu','Y',this)">Y</button><button onclick="setVal('eu','N',this)">N</button></div></div>
            <div class='field' id='red_flag_container' style='display:none;'><label>If yes, are there any other red flags on the account?</label><div class='choice-row'><button onclick="setVal('red_flags','Y',this)">Y</button><button onclick="setVal('red_flags','N',this)">N</button></div></div>`;
    } else if(type === 'lrv') {
        f += `<div class='field'><label>Account Overview:</label><input oninput="state['overview']=this.value"><label>Signatory Name:</label><input oninput="state['sig_name']=this.value"><label>Role/Title:</label><input oninput="state['role']=this.value"></div>`;
    }

    f += `<div class="action-section"><label><strong>Final Action:</strong></label><div class='choice-row' style="margin-bottom:8px;"><button onclick="setVal('action','Verify',this)">Verify</button><button onclick="setVal('action','RFD',this)">RFD</button><button onclick="setVal('action','Fail',this)">Fail</button><button onclick="setVal('action','Transfer',this)">Transfer</button><button onclick="setVal('action','Escalate',this)">Escalate</button></div><select id="reason_dropdown" style="display:none;" onchange="state['action_details']=this.value; document.getElementById('action_input').value=this.value;"><option value=''>-- Select Reason --</option>${reasons[type].map(r => `<option value="${r}">${r}</option>`).join('')}</select><input id="action_input" placeholder="Custom reason..." oninput="state['action_details']=this.value"></div>`;
    document.getElementById('form').innerHTML = f;
}

function generate() {
    let deltaStr = (state.delta || []).join(', ');
    let infoStr = (state.info || []).join(', ');
    let actionFinal = (state.action || '') + (state.action_details ? ' - ' + state.action_details : '');
    let o = "";

    if(current === 'bav ramp') {
        o = `<strong>KYC LR- BAV RAMP </strong><br>\nAccount Overview: ${state.overview || ''}<br>\nPotential LEC: ${state.lec || ''}<br>\nPotential wrong entity: ${state.wrong || ''}<br>\nBS: ${state.bs || ''}<br>\nIs BS in name of BO (only for UK Seller): ${state.uk_bo || ''}<br>\nPSC/Companies SS/SA Urn: ${state.psc || ''}<br>\nMO: ${state.mo || ''}<br>\nIs it a EU based seller with 3rd party payment provider? ${state.eu || ''}<br>\n`;
        if (state.eu === 'Y') {
            o += `If yes, are there any other red flags on the account? ${state.red_flags || ''}<br>\n`;
        }
        o += `<strong>Action: ${actionFinal}</strong><br>`;
    } else {
        o = `<strong>KYC LR- ${current.toUpperCase()} </strong><br>\n`;
        if(current === 'lrv') o = `<strong>Low - KYC LRV:</strong><br>\n`;

        const addCommons = () => `Potential LEC: ${state.lec || ''}<br>\nPotential wrong entity: ${state.wrong || ''}<br>\nCOC WF - Delta code: ${deltaStr}<br>\nCOC WF - what info changed: ${infoStr}<br>\nCOC WF - bank account belongs to registered person or business ? ${state.bank || ''}<br>\n`;

        if(current === 'loa') {
            o += `disb. status check: ${state.disb || ''}<br>\n` + addCommons() + `Legal representative verification (if no LRV task): ${state.lrv || ''}<br>\nLOA URN: ${state.urn || ''}<br>\nLOA signatory registration status (APA only): ${state.sign || ''}<br>\n`;
        } else if(current === 'idv') {
            o += `Does FDD apply?: ${state.fdd || ''}<br>\ndisb. status check: ${state.disb || ''}<br>\n` + addCommons() + `POC legal representative check: ${state.poc || ''}<br>\nID URN: ${state.id_urn || ''}<br>\nPOA URN: ${state.poa_urn || ''}<br>\n<strong>Strategic or Trusted?: ${state.tier || ''}</strong><br>\nsuspicious doc check: ${state.susp || ''}<br>\n`;
        } else if(current === 'biv') {
            o += `Does FDD apply?: ${state.fdd || ''}<br>\ndisb. status check: ${state.disb || ''}<br>\n` + addCommons() + `POC legal representative check: ${state.poc || ''}<br>\nRE URN: ${state.re_urn || ''}<br>\nExternal Research URN: ${state.ext_urn || ''}<br>\n<strong>Strategic or Trusted?: ${state.tier || ''}</strong><br>\n`;
        } else if(current === 'bov') {
            o += `Does FDD apply?: ${state.fdd || ''}<br>\ndisb. status check: ${state.disb || ''}<br>\n` + addCommons() + `SA doc confirming ownership: ${state.sa_doc || ''}<br>\nDoes SA information match central registry?: ${state.sa_match || ''}<br>\n<strong>Strategic or Trusted?: ${state.tier || ''}</strong><br>\n`;
        } else if(current === 'lrv') {
            o += `Account Overview: ${state.overview || ''}<br>\nLOA signatory [${state.sig_name || ''}] validated... ${state.role || ''}<br>\n` + addCommons();
            o += `<strong>Outcome: ${actionFinal}</strong><br>\n`;
            document.getElementById('output').value = o; return;
        }
        o += `<strong>Action: ${actionFinal}</strong><br>`;
    }
    document.getElementById('output').value = o;
}

async function copy() {
    const text = document.getElementById('output').value.replace(/<br>\n/g, '\n').replace(/<strong>/g, '').replace(/<\/strong>/g, '');
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn'); btn.innerText = "✓ Copied!";
    setTimeout(() => btn.innerText = "Copy to Clipboard", 2000);
}
</script>
</body>
</html>
